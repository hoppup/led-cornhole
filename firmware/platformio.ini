; ============================================================
; LED Cornhole Scoreboard — PlatformIO Configuration
; https://github.com/hoppup/led-cornhole
; ============================================================

[platformio]
default_envs = esp32dev

; --- ESP32-S3 (Final production board) ---
[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    fastled/FastLED@^3.6.0
build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1

; --- ESP32 WROOM-32 (Dev/testing with boards Justin has on hand) ---
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    fastled/FastLED@^3.6.0
