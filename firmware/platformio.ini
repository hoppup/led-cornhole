; PlatformIO configuration for LED Cornhole Scoreboard
; https://github.com/hoppup/led-cornhole

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    fastled/FastLED@^3.6.0
upload_speed = 921600

; For development with regular ESP32 (WROOM-32)
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    fastled/FastLED@^3.6.0
upload_speed = 921600
